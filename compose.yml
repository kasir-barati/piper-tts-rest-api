services:
  piper-tts:
    # image: 9109679196/piper-tts-rest-api:2.1.0
    # environment:
    #   LOGGING_MODE: "JSON"
    build: .
    user: "1000:1000"
    ports:
      - "3000:$PORT"
    env_file:
      - .env
    depends_on:
      otel-collector:
        condition: service_started
      otel-healthcheck:
        condition: service_completed_successfully

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.155.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./local-setup/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - 4318:4318 # OTLP HTTP
      - 4317:4317 # OTLP gRPC

  otel-healthcheck:
    image: busybox:1.37
    depends_on:
      otel-collector:
        condition: service_started
    command: >
      sh -c '
        for i in $$(seq 1 30); do
          wget -qO- http://otel-collector:13133/ && exit 0
          echo "Waiting for otel-collector health endpoint..."
          sleep 2
        done
        echo "otel-collector did not become healthy in time"
        exit 1
      '

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - 16686:16686 # UI
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:14269"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
